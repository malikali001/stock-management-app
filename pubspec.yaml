name: psx_portfolio_tracker
description: "PSX Portfolio Tracker - Pakistan Stock Exchange portfolio tracking app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.4.0
  html: ^0.15.4
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  intl: ^0.20.2
  uuid: ^4.5.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#0B0F1A"
  adaptive_icon_foreground: "assets/app_icon_solid.png"

flutter:
  uses-material-design: true
